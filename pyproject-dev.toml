[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidalapi"
version = "0.1.0"
description = "Clean Python client for the TIDAL music streaming API"
license = "LGPL-3.0-or-later"
requires-python = ">= 3.10"
authors = [{ name = "quodrum-glas" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Lesser General Public License v3 or later (LGPLv3+)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10"
# NO dependencies - installed via system packages
dependencies = []

[project.optional-dependencies]
drm = []  # pywidevine installed via system
dev = ["pytest", "pytest-cov", "pytest-mock", "ruff"]

[project.urls]
Homepage = "https://github.com/quodrum-glas/python-tidal"

[tool.hatch.build.targets.sdist]
include = ["tidalapi/"]

[tool.hatch.build.targets.wheel]
packages = ["tidalapi"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["tidalapi"]
force-single-line = false

[tool.pytest.ini_options]
testpaths = ["tests"]
